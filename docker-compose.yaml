version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"       # AMQP протокол
      - "15672:15672"     # Web UI (http://localhost:15672, guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot1_waiter:
    build: .
    container_name: bot1_waiter
    command: python bot1_waiter.py
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  bot2_kitchen:
    build: .
    container_name: bot2_kitchen
    command: python bot2_kitchen.py
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped